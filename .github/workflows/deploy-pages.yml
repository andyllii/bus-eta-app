name: Deploy web-app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-app/package-lock.json
      - run: npm ci --no-audit --no-fund
      # Build in demo/mock mode so the PWA renders HK bus data without a live
      # backend. Set VITE_API_BASE in repo secrets/vars to point at a real API
      # (e.g. a Render/Railway backend) for live ETAs.
      - run: npm run build
        env:
          VITE_USE_MOCK: "true"
          VITE_BASE: "/bus-eta-app/"
      # SPA fallback so deep links like /bus-eta-app/results resolve.
      - run: cp dist/index.html dist/404.html
      - run: touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
