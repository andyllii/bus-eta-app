<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Search — Bus ETA</title>
<link rel="stylesheet" href="../web-app/dist/assets/index-CCDVQvpa.css" />
<link rel="stylesheet" href="../web-app/src/index.css" />
<link rel="stylesheet" href="_shared.css" />
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="screen">
    <div class="app-scroll">
      <!-- iOS status bar -->
      <div class="statusbar">
        <span>9:41</span>
        <span class="right">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2.5" width="3" height="9.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
          <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><path d="M8.5 2.5c2.5 0 4.8 1 6.5 2.6l-1.2 1.3A7 7 0 0 0 8.5 4.6 7 7 0 0 0 3.2 6.4L2 5.1A9 9 0 0 1 8.5 2.5z"/><path d="M8.5 6.2c1.5 0 2.9.6 3.9 1.6l-1.2 1.3a3.5 3.5 0 0 0-5.4 0L4.6 7.8A5.5 5.5 0 0 1 8.5 6.2z"/><circle cx="8.5" cy="10.4" r="1.4"/></svg>
          <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="21" height="11" rx="3" stroke="currentColor" stroke-width="1.3"/><rect x="3" y="3" width="16" height="7" rx="1.5" fill="currentColor"/><rect x="23" y="4" width="2" height="5" rx="1" fill="currentColor"/></svg>
        </span>
      </div>

      <!-- TopBar (verbatim from TopBar.tsx) -->
      <header class="sticky top-0 z-10 bg-brand text-white shadow">
        <div class="mx-auto flex max-w-app items-center justify-between px-4 py-3">
          <h1 class="text-base font-semibold tracking-wide">巴士到站 · Bus ETA</h1>
          <div class="flex gap-1">
            <button aria-pressed="false" class="flex min-h-[44px] min-w-[44px] items-center justify-center rounded px-2 text-xs font-medium transition bg-brand-dark/60 text-white/80 hover:bg-brand-dark">EN</button>
            <button aria-pressed="true" class="flex min-h-[44px] min-w-[44px] items-center justify-center rounded px-2 text-xs font-medium transition bg-white text-brand">繁</button>
            <button aria-pressed="false" class="flex min-h-[44px] min-w-[44px] items-center justify-center rounded px-2 text-xs font-medium transition bg-brand-dark/60 text-white/80 hover:bg-brand-dark">简</button>
          </div>
        </div>
      </header>

      <!-- SearchScreen body -->
      <div class="mx-auto max-w-app px-4 py-4">
        <div class="mb-4">
          <p class="text-sm text-gray-600">搜尋路線或車站 · Search routes or stops</p>
        </div>

        <form role="search" class="relative">
          <input type="search" inputmode="search" autocomplete="off" aria-label="Search routes or stops"
            value="1"
            placeholder="e.g. 1 / 長沙灣廣場 / Central"
            data-testid="search-input"
            class="min-h-[44px] w-full rounded-xl border border-gray-300 bg-white px-4 py-3 text-base shadow-sm outline-none focus:border-brand focus:ring-2 focus:ring-brand/30" />
          <span aria-hidden="true" class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-400">…</span>
        </form>

        <!-- Quick-pick chips (DEFAULT_ROUTES = 1, 10, 113, 11K) -->
        <ul class="mt-4 flex flex-wrap gap-2">
          <li><button class="inline-flex min-h-[44px] items-center rounded-full bg-brand/10 px-4 text-sm font-medium text-brand">路線 1</button></li>
          <li><button class="inline-flex min-h-[44px] items-center rounded-full bg-brand/10 px-4 text-sm font-medium text-brand">路線 10</button></li>
          <li><button class="inline-flex min-h-[44px] items-center rounded-full bg-brand/10 px-4 text-sm font-medium text-brand">路線 113</button></li>
          <li><button class="inline-flex min-h-[44px] items-center rounded-full bg-brand/10 px-4 text-sm font-medium text-brand">路線 11K</button></li>
        </ul>

        <!-- Search results -->
        <ul class="mt-4 space-y-2" aria-label="Search results" aria-busy="false" aria-live="polite">
          <li>
            <button data-testid="search-result" data-kind="route" data-id="1"
              class="flex min-h-[44px] w-full items-center justify-between rounded-xl bg-white px-4 py-3 text-left shadow-sm ring-1 ring-gray-100 active:bg-gray-50">
              <span class="min-w-0">
                <span class="block truncate font-medium text-gray-900">路線 1</span>
                <span class="block truncate text-xs text-gray-500">中環（港澳碼頭） · Central (Macao Ferry)</span>
              </span>
              <span class="ml-3 shrink-0 rounded bg-brand px-2 py-0.5 text-[10px] font-semibold uppercase text-white">Route</span>
            </button>
          </li>
          <li>
            <button data-testid="search-result" data-kind="route" data-id="1A"
              class="flex min-h-[44px] w-full items-center justify-between rounded-xl bg-white px-4 py-3 text-left shadow-sm ring-1 ring-gray-100 active:bg-gray-50">
              <span class="min-w-0">
                <span class="block truncate font-medium text-gray-900">路線 1A</span>
                <span class="block truncate text-xs text-gray-500">竹園邨 · Chuk Yuen Estate</span>
              </span>
              <span class="ml-3 shrink-0 rounded bg-brand px-2 py-0.5 text-[10px] font-semibold uppercase text-white">Route</span>
            </button>
          </li>
          <li>
            <button data-testid="search-result" data-kind="stop" data-id="946C74E30100FE80"
              class="flex min-h-[44px] w-full items-center justify-between rounded-xl bg-white px-4 py-3 text-left shadow-sm ring-1 ring-gray-100 active:bg-gray-50">
              <span class="min-w-0">
                <span class="block truncate font-medium text-gray-900">長沙灣廣場</span>
                <span class="block truncate text-xs text-gray-500">1 · 2 · 6</span>
              </span>
              <span class="ml-3 shrink-0 rounded bg-gray-200 px-2 py-0.5 text-[10px] font-semibold uppercase text-gray-600">Stop</span>
            </button>
          </li>
          <li>
            <button data-testid="search-result" data-kind="stop" data-id="FE94185A9C2B6A11"
              class="flex min-h-[44px] w-full items-center justify-between rounded-xl bg-white px-4 py-3 text-left shadow-sm ring-1 ring-gray-100 active:bg-gray-50">
              <span class="min-w-0">
                <span class="block truncate font-medium text-gray-900">Central · 中環</span>
                <span class="block truncate text-xs text-gray-500">1 · 10 · 113</span>
              </span>
              <span class="ml-3 shrink-0 rounded bg-gray-200 px-2 py-0.5 text-[10px] font-semibold uppercase text-gray-600">Stop</span>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
</body>
</html>
